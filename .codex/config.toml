#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
persistent_instructions = "Follow AGENTS.md and keep Magok real-estate data provenance visible. Prefer small verified changes."

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.hermes]
description = "Hermes-style coordinator for minimal, verified Magok dashboard improvements."
config_file = "agents/hermes.toml"

[agents.uiuxmaxpro]
description = "Read-only UI/UX reviewer for responsive layout, readability, and trust cues."
config_file = "agents/uiuxmaxpro.toml"

[agents.explorer]
description = "Read-only codebase explorer for evidence gathering."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Correctness and verification reviewer."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation verifier for API behavior and release-note checks."
config_file = "agents/docs-researcher.toml"

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
startup_timeout_sec = 30

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 30

[mcp_servers.exa]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.exa.ai/mcp"]
startup_timeout_sec = 30

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
startup_timeout_sec = 30

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--extension"]
startup_timeout_sec = 30

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
startup_timeout_sec = 30

