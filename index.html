<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="마곡동 상가·업무시설 실거래가 대시보드" />
    <title>마곡동 실거래 대시보드</title>
    <script>
      const dashboardFile = "20260608-magok-commercial-price-dashboard.html";
      const isDist = window.location.pathname.includes("/dist/") || window.location.pathname.includes("\\dist\\");
      const isLocalDev = /^(localhost|127\.0\.0\.1|\[::1\])$/.test(window.location.hostname);

      async function renderStaticDashboard() {
        const candidates = isDist
          ? [{ url: "./" + dashboardFile, base: "./" }]
          : [
              { url: "./docs/ai-output/" + dashboardFile, base: "./docs/ai-output/" },
              { url: "./" + dashboardFile, base: "./" },
            ];

        for (const candidate of candidates) {
          try {
            const response = await fetch(candidate.url, { cache: "no-store" });
            if (!response.ok) continue;
            const html = await response.text();
            const baseHref = new URL(candidate.base, window.location.href).href;
            const rendered = html.replace(/<head>/i, '<head><base href="' + baseHref + '">');
            document.open();
            document.write(rendered);
            document.close();
            return;
          } catch (_) {
            // Try the next known static dashboard location.
          }
        }
      }

      if (window.location.protocol === "file:") {
        window.location.replace(isDist ? "./" + dashboardFile : "./docs/ai-output/" + dashboardFile);
      } else if (!isLocalDev) {
        window.addEventListener("DOMContentLoaded", renderStaticDashboard);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
