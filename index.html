<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="마곡동 상가·업무시설 실거래가 대시보드" />
    <title>마곡동 실거래 대시보드</title>
    <script>
      const dashboardFile = "20260608-magok-commercial-price-dashboard.html";
      const isDist = window.location.pathname.includes("/dist/") || window.location.pathname.includes("\\dist\\");
      const isLocalDev = /^(localhost|127\.0\.0\.1|\[::1\])$/.test(window.location.hostname);

      if (window.location.protocol === "file:") {
        window.location.replace(isDist ? `./${dashboardFile}` : `./docs/ai-output/${dashboardFile}`);
      } else if (!isLocalDev) {
        window.addEventListener("DOMContentLoaded", async () => {
          const docsDashboard = `./docs/ai-output/${dashboardFile}`;
          try {
            const response = await fetch(docsDashboard, { method: "HEAD", cache: "no-store" });
            window.location.replace(response.ok ? docsDashboard : `./${dashboardFile}`);
          } catch (_) {
            window.location.replace(docsDashboard);
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
